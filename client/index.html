<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>
  </head>
  <body>
    <div id="app">
      <div class="game-container">
        <h1>Tic Tac Toe</h1>
        
        <div class="player-info">
          <div id="player1-info" class="player-card">
            <div class="player-name" id="player1-name">Waiting for player...</div>
            <div class="player-symbol">X</div>
          </div>
          <div class="vs">VS</div>
          <div id="player2-info" class="player-card">
            <div class="player-name" id="player2-name">Waiting for player...</div>
            <div class="player-symbol">O</div>
          </div>
        </div>

        <div id="game-status" class="game-status">Waiting for players...</div>

        <div id="leader-badge" class="leader-badge" style="display:none;">Room Leader</div>

        <div class="board-container">
          <div class="board" id="board">
            <button class="cell" data-index="0"></button>
            <button class="cell" data-index="1"></button>
            <button class="cell" data-index="2"></button>
            <button class="cell" data-index="3"></button>
            <button class="cell" data-index="4"></button>
            <button class="cell" data-index="5"></button>
            <button class="cell" data-index="6"></button>
            <button class="cell" data-index="7"></button>
            <button class="cell" data-index="8"></button>
          </div>
        </div>

        <div class="button-group">
          <button id="start-btn" class="action-btn start-btn" style="display:none;">Start Game</button>
          <button id="rematch-btn" class="action-btn rematch-btn" style="display:none;">Rematch</button>
        </div>
      </div>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
